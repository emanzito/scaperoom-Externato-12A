<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bem-vindo</title>
  <link rel="stylesheet" href="css/style.css">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      background: #0a0a0a;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: system-ui, -apple-system, sans-serif;
      overflow: hidden;
      position: relative;
    }

    .grid-overlay {
      position: fixed;
      inset: 0;
      background:
        repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(255,255,255,0.012) 2px, rgba(255,255,255,0.012) 4px);
      pointer-events: none;
    }

    .line-v {
      position: fixed;
      top: 0; left: 50%;
      transform: translateX(-50%);
      width: 1px; height: 100%;
      background: linear-gradient(to bottom, transparent, rgba(255,255,255,0.05), transparent);
      pointer-events: none;
    }

    .line-h {
      position: fixed;
      top: 50%; left: 0;
      transform: translateY(-50%);
      width: 100%; height: 1px;
      background: linear-gradient(to right, transparent, rgba(255,255,255,0.05), transparent);
      pointer-events: none;
    }

    .corner {
      position: fixed;
      width: 24px; height: 24px;
    }
    .corner.tl { top: 1.5rem; left: 1.5rem; border-top: 1px solid rgba(255,255,255,0.2); border-left: 1px solid rgba(255,255,255,0.2); }
    .corner.tr { top: 1.5rem; right: 1.5rem; border-top: 1px solid rgba(255,255,255,0.2); border-right: 1px solid rgba(255,255,255,0.2); }
    .corner.bl { bottom: 1.5rem; left: 1.5rem; border-bottom: 1px solid rgba(255,255,255,0.2); border-left: 1px solid rgba(255,255,255,0.2); }
    .corner.br { bottom: 1.5rem; right: 1.5rem; border-bottom: 1px solid rgba(255,255,255,0.2); border-right: 1px solid rgba(255,255,255,0.2); }

    main {
      text-align: center;
      position: relative;
      z-index: 1;
      animation: fadeUp 0.9s ease both;
    }

    .label {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      margin-bottom: 2rem;
    }

    .label-line {
      height: 1px;
      width: 40px;
      background: rgba(255,255,255,0.18);
    }

    .label-text {
      font-size: 11px;
      letter-spacing: 4px;
      color: rgba(255,255,255,0.3);
      text-transform: uppercase;
    }

    h1 {
      font-size: clamp(2rem, 5vw, 3.4rem);
      font-weight: 300;
      color: #ffffff;
      letter-spacing: -1px;
      line-height: 1.1;
      margin-bottom: 0.4rem;
    }

    h1 span {
      font-weight: 500;
      letter-spacing: 2px;
      text-transform: uppercase;
      font-size: clamp(1.1rem, 2.5vw, 1.6rem);
      display: block;
      margin-top: 0.3rem;
    }

    .subtitle {
      font-size: 15px;
      color: rgba(255,255,255,0.4);
      letter-spacing: 1px;
      margin: 1.8rem 0 2.5rem;
      font-weight: 300;
    }

    .clock {
      font-family: monospace;
      font-size: 13px;
      color: rgba(255,255,255,0.25);
      letter-spacing: 3px;
      margin-bottom: 2.5rem;
    }

    .clock span {
      animation: blink 1s infinite;
    }

    .btn {
      display: inline-block;
      background: #ffffff;
      color: #0a0a0a;
      text-decoration: none;
      padding: 14px 44px;
      font-size: 13px;
      font-weight: 500;
      letter-spacing: 2.5px;
      text-transform: uppercase;
      border-radius: 2px;
      transition: all 0.2s;
    }

    .btn:hover {
      background: rgba(255,255,255,0.88);
      transform: translateY(-1px);
    }

    .btn:active {
      transform: scale(0.97);
    }

    .status {
      margin-top: 2.5rem;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }

    .dot {
      width: 6px; height: 6px;
      border-radius: 50%;
      background: #4ade80;
      animation: pulse 2s infinite;
    }

    .status-text {
      font-size: 11px;
      color: rgba(255,255,255,0.22);
      letter-spacing: 2px;
      text-transform: uppercase;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(20px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    @keyframes blink {
      0%, 100% { opacity: 1; }
      50%       { opacity: 0; }
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50%       { opacity: 0.35; }
    }
  </style>
</head>
<body>

  <div class="grid-overlay"></div>
  <div class="line-v"></div>
  <div class="line-h"></div>
  <div class="corner tl"></div>
  <div class="corner tr"></div>
  <div class="corner bl"></div>
  <div class="corner br"></div>

  <main>
    <div class="label">
      <div class="label-line"></div>
      <span class="label-text">Missão Ativada</span>
      <div class="label-line"></div>
    </div>

    <h1>
      Escape Room
      <span>Colégio</span>
    </h1>

    <p class="subtitle">Tens o que é preciso para escapar?</p>

    <div class="clock" id="clock">--:--:-- <span>|</span></div>

    <a href="html/pagina inicial.html" class="btn">Entrar na Aventura</a>

    <div class="status">
      <div class="dot"></div>
      <span class="status-text">Sistema Online</span>
    </div>
  </main>
