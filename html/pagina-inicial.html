<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Escape Room Colégio</title>
    <link rel="icon" type="image/png" href="../images/logo.png">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: system-ui, -apple-system, sans-serif; background: #0a0a0a; width: 100vw; height: 100vh; overflow: hidden; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        #map-wrapper { position: relative; width: 100%; height: 100%; display: flex; align-items: center; justify-content: center; }
        #map-img { display: block; max-width: 100%; max-height: 100%; width: auto; height: auto; object-fit: contain; user-select: none; pointer-events: none; }
        #map-inner { position: absolute; pointer-events: none; }
        #timer { position: fixed; top: 20px; right: 20px; z-index: 20; font-family: monospace; font-size: 22px; font-weight: 600; color: #fff; background: rgba(0,0,0,0.7); border: 1px solid rgba(255,255,255,0.15); padding: 10px 18px; border-radius: 6px; letter-spacing: 3px; }
        #timer.warning { color: #f87171; border-color: rgba(248,113,113,0.4); }
        #progress-dots { position: fixed; top: 20px; left: 20px; z-index: 20; display: flex; gap: 8px; flex-wrap: wrap; max-width: 260px; background: rgba(0,0,0,0.65); border: 1px solid rgba(255,255,255,0.12); padding: 8px 14px; border-radius: 6px; }
        .prog-dot { width: 10px; height: 10px; border-radius: 50%; background: rgba(255,255,255,0.2); border: 1px solid rgba(255,255,255,0.3); transition: all 0.4s; }
        .prog-dot.solved { background: #4ade80; border-color: #4ade80; box-shadow: 0 0 6px rgba(74,222,128,0.6); }
        #progress-bar { position: fixed; bottom: 0; left: 0; width: 100%; height: 4px; background: rgba(255,255,255,0.1); z-index: 20; }
        #progress-fill { height: 100%; background: #4ade80; transition: width 0.5s; width: 0%; }

        .hotspot { position: absolute; transform: translate(-50%, -50%); cursor: pointer; pointer-events: all; border-radius: 50%; border: 2px solid rgba(255,255,255,0); transition: all 0.3s; }
        .hotspot:hover { border-color: rgba(255,255,255,0.75); box-shadow: 0 0 18px rgba(255,255,255,0.2), inset 0 0 12px rgba(255,255,255,0.05); background: rgba(255,255,255,0.04); }
        .hotspot.size-normal { width: 44px; height: 44px; }
        .hotspot.size-small  { width: 28px; height: 28px; }
        .hotspot .label { position: absolute; top: calc(100% + 6px); left: 50%; transform: translateX(-50%); font-size: 11px; font-weight: 500; letter-spacing: 2px; text-transform: uppercase; color: transparent; opacity: 0; white-space: nowrap; transition: color 0.3s; pointer-events: none; }
        .hotspot:hover .label { color: rgba(255,255,255,0.95); opacity: 1; text-shadow: 0 1px 4px rgba(0,0,0,0.9); }
        .hotspot.solved { border-color: rgba(74,222,128,0.5) !important; background: rgba(74,222,128,0.05); }
        .hotspot.solved:hover .label { color: rgba(74,222,128,0.9) !important; }

        /* Botões em baixo */
        #bottom-bar { position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%); z-index: 20; display: flex; align-items: center; gap: 10px; }
        #exit { background: rgba(255,255,255,0.06); color: rgba(255,255,255,0.35); border: 1px solid rgba(255,255,255,0.12); padding: 12px 36px; font-size: 12px; font-weight: 500; letter-spacing: 3px; text-transform: uppercase; cursor: pointer; border-radius: 3px; transition: all 0.3s; font-family: inherit; }
        #exit.ready { background: rgba(74,222,128,0.15); color: #4ade80; border-color: rgba(74,222,128,0.4); box-shadow: 0 0 20px rgba(74,222,128,0.1); }
        #exit.ready:hover { background: rgba(74,222,128,0.25); }
        #hints-btn { background: rgba(255,255,255,0.06); color: rgba(255,255,255,0.4); border: 1px solid rgba(255,255,255,0.12); padding: 12px 16px; font-size: 16px; cursor: pointer; border-radius: 3px; transition: all 0.3s; font-family: inherit; line-height: 1; }
        #hints-btn:hover { background: rgba(255,255,255,0.12); color: #fff; }

        #hint { position: fixed; bottom: 72px; left: 50%; transform: translateX(-50%); font-size: 12px; color: rgba(255,255,255,0.75); letter-spacing: 2px; text-transform: uppercase; z-index: 20; pointer-events: none; white-space: nowrap; animation: pulse-hint 3s infinite; text-shadow: 0 1px 4px rgba(0,0,0,0.8); }
        @keyframes pulse-hint { 0%,100%{opacity:0.7} 50%{opacity:1} }

        /* Popup de pistas */
        #hints-overlay {
            display: none;
            position: fixed; inset: 0; z-index: 50;
            background: rgba(0,0,0,0.7);
            backdrop-filter: blur(4px);
            align-items: center; justify-content: center;
        }
        #hints-overlay.open { display: flex; }
        #hints-popup {
            background: #111; border: 1px solid rgba(255,255,255,0.12);
            border-radius: 12px; padding: 2rem; max-width: 480px; width: 90%;
            max-height: 80vh; overflow-y: auto;
            animation: fadeUp 0.3s ease both;
        }
        @keyframes fadeUp { from{opacity:0;transform:translateY(16px)} to{opacity:1;transform:translateY(0)} }
        #hints-popup h2 { font-size: 13px; font-weight: 500; letter-spacing: 4px; text-transform: uppercase; color: rgba(255,255,255,0.4); margin-bottom: 1.5rem; }
        .hint-item { display: flex; gap: 14px; align-items: flex-start; padding: 12px 0; border-bottom: 1px solid rgba(255,255,255,0.06); }
        .hint-item:last-child { border-bottom: none; }
        .hint-num { font-family: monospace; font-size: 11px; color: rgba(255,255,255,0.25); min-width: 20px; padding-top: 2px; }
        .hint-text { font-size: 14px; color: rgba(255,255,255,0.7); line-height: 1.6; }
        .hint-text strong { color: rgba(255,255,255,0.95); font-weight: 500; }
        .no-hints { font-size: 14px; color: rgba(74,222,128,0.8); text-align: center; padding: 1rem 0; }
        #hints-close { margin-top: 1.5rem; width: 100%; background: rgba(255,255,255,0.06); color: rgba(255,255,255,0.5); border: 1px solid rgba(255,255,255,0.12); padding: 10px; font-size: 12px; letter-spacing: 2px; text-transform: uppercase; cursor: pointer; border-radius: 4px; font-family: inherit; transition: all 0.2s; }
        #hints-close:hover { background: rgba(255,255,255,0.1); color: #fff; }
    </style>
</head>
<body>
    <div id="map-wrapper">
        <img id="map-img" src="../images/fundoescondido1.png" alt="mapa">
        <div id="map-inner">
            <div class="hotspot size-normal" data-x="3"    data-y="9"    onclick="enterRoom('romaria')">   <div class="label">Zona A</div></div>
            <div class="hotspot size-small"  data-x="59"   data-y="2"    onclick="enterRoom('tamega')">    <div class="label">Zona B</div></div>
            <div class="hotspot size-small"  data-x="45.5" data-y="13.5" onclick="enterRoom('cabreira')">  <div class="label">Zona C</div></div>
            <div class="hotspot size-small"  data-x="64.9" data-y="14.8" onclick="enterRoom('educacao')">  <div class="label">Zona D</div></div>
            <div class="hotspot size-small"  data-x="20"   data-y="35.6" onclick="enterRoom('biologia')">  <div class="label">Zona E</div></div>
            <div class="hotspot size-normal" data-x="41.4" data-y="55"   onclick="enterRoom('moral')">     <div class="label">Zona F</div></div>
            <div class="hotspot size-normal" data-x="62.5" data-y="52"   onclick="enterRoom('jogopau')">   <div class="label">Zona G</div></div>
            <div class="hotspot size-small"  data-x="82.3" data-y="60"   onclick="enterRoom('mosteiro')">  <div class="label">S. Miguel</div></div>
            <div class="hotspot size-small"  data-x="12.8" data-y="80"   onclick="enterRoom('basto')">     <div class="label">Zona I</div></div>
            <div class="hotspot size-small"  data-x="30"   data-y="77"   onclick="enterRoom('portugues')"> <div class="label">Zona J</div></div>
            <div class="hotspot size-small"  data-x="49.7" data-y="83"   onclick="enterRoom('senhorinha')"><div class="label">Zona K</div></div>
            <div class="hotspot size-small"  data-x="62.6" data-y="74.5" onclick="enterRoom('math')">      <div class="label">Zona L</div></div>
            <div class="hotspot size-small"  data-x="86.8" data-y="88.8" onclick="enterRoom('psicologia')"><div class="label">Zona M</div></div>
        </div>
    </div>

    <div id="timer"></div>
    <div id="progress-dots">
        <div class="prog-dot" id="dot-mosteiro"></div>
        <div class="prog-dot" id="dot-basto"></div>
        <div class="prog-dot" id="dot-senhorinha"></div>
        <div class="prog-dot" id="dot-romaria"></div>
        <div class="prog-dot" id="dot-jogopau"></div>
        <div class="prog-dot" id="dot-tamega"></div>
        <div class="prog-dot" id="dot-cabreira"></div>
        <div class="prog-dot" id="dot-math"></div>
        <div class="prog-dot" id="dot-portugues"></div>
        <div class="prog-dot" id="dot-biologia"></div>
        <div class="prog-dot" id="dot-educacao"></div>
        <div class="prog-dot" id="dot-psicologia"></div>
        <div class="prog-dot" id="dot-moral"></div>
    </div>

    <p id="hint">Explora o mapa para encontrar os enigmas</p>

    <div id="bottom-bar">
        <button id="hints-btn" onclick="openHints()" title="Pistas">💡</button>
        <button id="exit" onclick="tryExit()">Saída</button>
    </div>

    <div id="progress-bar"><div id="progress-fill"></div></div>

    <!-- Popup de pistas -->
    <div id="hints-overlay" onclick="closeHintsOutside(event)">
        <div id="hints-popup">
            <h2>Pistas — enigmas por resolver</h2>
            <div id="hints-list"></div>
            <button id="hints-close" onclick="closeHints()">Fechar</button>
        </div>
    </div>

    <script src="../js/script.js"></script>
    <script>
        const img = document.getElementById('map-img');
        const inner = document.getElementById('map-inner');

        function positionHotspots() {
            const rect = img.getBoundingClientRect();
            const wrapperRect = img.parentElement.getBoundingClientRect();
            inner.style.left   = (rect.left - wrapperRect.left) + 'px';
            inner.style.top    = (rect.top  - wrapperRect.top)  + 'px';
            inner.style.width  = rect.width  + 'px';
            inner.style.height = rect.height + 'px';
            document.querySelectorAll('.hotspot').forEach(h => {
                h.style.left = (parseFloat(h.dataset.x) / 100 * rect.width)  + 'px';
                h.style.top  = (parseFloat(h.dataset.y) / 100 * rect.height) + 'px';
            });
        }

        img.addEventListener('load', positionHotspots);
        window.addEventListener('resize', positionHotspots);
        if (img.complete) positionHotspots();

        const ALL_SUBJECTS = ['mosteiro','basto','senhorinha','romaria','jogopau','tamega','cabreira','math','portugues','biologia','educacao','psicologia','moral'];

        // Pistas por sala — descrição da imagem escondida
        const hintsData = {
            mosteiro:   { name: 'S. Miguel',        hint: 'Procura uma figura religiosa esculpida na fachada do edifício principal, do lado direito.' },
            basto:      { name: 'O Guardião',        hint: 'Há um símbolo antigo escondido entre os muros de pedra, no canto inferior esquerdo do mapa.' },
            senhorinha: { name: 'A Padroeira',       hint: 'Uma imagem devocional pequena está camuflada numa das entradas do corredor central.' },
            romaria:    { name: 'A Celebração',      hint: 'Procura um emblema colorido escondido entre a vegetação no canto superior esquerdo.' },
            jogopau:    { name: 'Arte Antiga',       hint: 'Duas figuras em movimento estão escondidas no claustro — olha bem para o jardim interior.' },
            tamega:     { name: 'O Rio',             hint: 'Um pequeno símbolo azul está camuflado na zona superior da imagem, perto da estrada.' },
            cabreira:   { name: 'A Serra',           hint: 'Procura uma imagem discreta escondida nos telhados da ala norte do edifício.' },
            math:       { name: 'Números',           hint: 'Um ícone pequeno está escondido na zona central-direita, junto às janelas do piso inferior.' },
            portugues:  { name: 'Palavras',          hint: 'Há uma imagem camuflada no campo de jogos, difícil de notar à primeira vista.' },
            biologia:   { name: 'Ciência Viva',      hint: 'Procura algo escondido na parede exterior esquerda do edifício, em baixo da estrada.' },
            educacao:   { name: 'Movimento',         hint: 'Um símbolo está camuflado na zona superior direita, perto do cruzamento de estradas.' },
            psicologia: { name: 'A Mente',           hint: 'Olha bem para o estacionamento no canto inferior direito — há algo escondido entre os carros.' },
            moral:      { name: 'Virtude',           hint: 'Uma figura está escondida no pátio interior, junto ao arco central do edifício.' }
        };

        function openHints() {
            const list = document.getElementById('hints-list');
            list.innerHTML = '';
            const unsolved = ALL_SUBJECTS.filter(s => !codes[s]);
            if (unsolved.length === 0) {
                list.innerHTML = '<p class="no-hints">✓ Resolveste todos os enigmas!</p>';
            } else {
                unsolved.forEach((s, i) => {
                    const d = hintsData[s];
                    const item = document.createElement('div');
                    item.className = 'hint-item';
                    item.innerHTML = `<span class="hint-num">${i + 1}</span><span class="hint-text"><strong>${d.name}</strong> — ${d.hint}</span>`;
                    list.appendChild(item);
                });
            }
            document.getElementById('hints-overlay').classList.add('open');
        }

        function closeHints() {
            document.getElementById('hints-overlay').classList.remove('open');
        }

        function closeHintsOutside(e) {
            if (e.target === document.getElementById('hints-overlay')) closeHints();
        }

        function updateDots() {
            let solved = 0;
            ALL_SUBJECTS.forEach(s => {
                if (codes[s]) {
                    const dot = document.getElementById('dot-' + s);
                    if (dot) dot.classList.add('solved');
                    solved++;
                }
                document.querySelectorAll('.hotspot').forEach(h => {
                    if (h.getAttribute('onclick') && h.getAttribute('onclick').includes("'" + s + "'") && codes[s]) {
                        h.classList.add('solved');
                    }
                });
            });
            document.getElementById('progress-fill').style.width = (solved / ALL_SUBJECTS.length * 100) + '%';
            if (solved === ALL_SUBJECTS.length) {
                document.getElementById('exit').classList.add('ready');
                document.getElementById('hint').textContent = 'Todos os enigmas resolvidos — vai para a Saída!';
            }
        }

        window.onload = function() {
            positionHotspots();
            if (document.getElementById('timer')) { startTimer(); updateDots(); }
        };
    </script>
</body>
</html>
