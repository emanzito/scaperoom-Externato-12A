<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Escape Room Colégio</title>
    <link rel="icon" type="image/png" href="../images/logo.png">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: system-ui, -apple-system, sans-serif; background: #0a0a0a; overflow: hidden; width: 100vw; height: 100vh; }
        #container { position: relative; width: 100vw; height: 100vh; }
        #map { position: relative; width: 100%; height: 100%; background-image: url('../images/photo-above-cut.jpg'); background-size: cover; background-position: center; }
        #map-overlay { position: absolute; inset: 0; background: rgba(0,0,0,0.3); }
        #timer { position: absolute; top: 20px; right: 20px; z-index: 10; font-family: monospace; font-size: 22px; font-weight: 600; color: #fff; background: rgba(0,0,0,0.65); border: 1px solid rgba(255,255,255,0.15); padding: 10px 18px; border-radius: 6px; letter-spacing: 3px; }
        #timer.warning { color: #f87171; border-color: rgba(248,113,113,0.4); }
        #progress-bar { position: absolute; bottom: 0; left: 0; width: 100%; height: 4px; background: rgba(255,255,255,0.1); z-index: 10; }
        #progress-fill { height: 100%; background: #4ade80; transition: width 0.5s ease; width: 0%; }
        #progress-dots { position: absolute; top: 20px; left: 20px; z-index: 10; display: flex; gap: 8px; align-items: center; flex-wrap: wrap; max-width: 260px; background: rgba(0,0,0,0.6); border: 1px solid rgba(255,255,255,0.12); padding: 8px 14px; border-radius: 6px; }
        .prog-dot { width: 10px; height: 10px; border-radius: 50%; background: rgba(255,255,255,0.2); border: 1px solid rgba(255,255,255,0.3); transition: all 0.4s ease; }
        .prog-dot.solved { background: #4ade80; border-color: #4ade80; box-shadow: 0 0 6px rgba(74,222,128,0.6); }
        .hotspot { position: absolute; width: 60px; height: 60px; border-radius: 50%; cursor: pointer; z-index: 5; background: transparent; border: none; }
        .hotspot::after { content: ''; position: absolute; inset: 0; border-radius: 50%; border: 2px solid rgba(255,255,255,0); transition: all 0.3s ease; }
        .hotspot:hover::after { border-color: rgba(255,255,255,0.7); box-shadow: 0 0 24px rgba(255,255,255,0.15), inset 0 0 20px rgba(255,255,255,0.05); }
        .hotspot .label { position: absolute; bottom: -28px; left: 50%; transform: translateX(-50%); font-size: 11px; font-weight: 500; letter-spacing: 2px; text-transform: uppercase; color: rgba(255,255,255,0); white-space: nowrap; transition: color 0.3s; text-shadow: 0 1px 4px rgba(0,0,0,0.8); }
        .hotspot:hover .label { color: rgba(255,255,255,0.95); }
        .hotspot.solved::after { border-color: rgba(74,222,128,0.5) !important; }
        .hotspot.solved .label { color: rgba(74,222,128,0.8) !important; }
        #exit { position: absolute; left: 50%; bottom: 30px; transform: translateX(-50%); z-index: 10; background: rgba(255,255,255,0.06); color: rgba(255,255,255,0.35); border: 1px solid rgba(255,255,255,0.12); padding: 12px 36px; font-size: 12px; font-weight: 500; letter-spacing: 3px; text-transform: uppercase; cursor: pointer; border-radius: 3px; transition: all 0.3s; font-family: inherit; }
        #exit.ready { background: rgba(74,222,128,0.15); color: #4ade80; border-color: rgba(74,222,128,0.4); box-shadow: 0 0 20px rgba(74,222,128,0.1); }
        #exit.ready:hover { background: rgba(74,222,128,0.25); }
        #hint { position: absolute; bottom: 80px; left: 50%; transform: translateX(-50%); font-size: 12px; color: rgba(255,255,255,0.75); letter-spacing: 2px; text-transform: uppercase; z-index: 10; pointer-events: none; white-space: nowrap; animation: pulse-hint 3s infinite; }
        @keyframes pulse-hint { 0%,100%{opacity:0.4} 50%{opacity:1} }
    </style>
</head>
<body>
    <div id="container">
        <div id="map">
            <div id="map-overlay"></div>
            <div id="timer">07:00</div>
            <div id="progress-dots">
                <div class="prog-dot" id="dot-mosteiro"></div>
                <div class="prog-dot" id="dot-basto"></div>
                <div class="prog-dot" id="dot-senhorinha"></div>
                <div class="prog-dot" id="dot-romaria"></div>
                <div class="prog-dot" id="dot-jogopau"></div>
                <div class="prog-dot" id="dot-tamega"></div>
                <div class="prog-dot" id="dot-cabreira"></div>
                <div class="prog-dot" id="dot-math"></div>
                <div class="prog-dot" id="dot-portugues"></div>
                <div class="prog-dot" id="dot-biologia"></div>
                <div class="prog-dot" id="dot-educacao"></div>
                <div class="prog-dot" id="dot-psicologia"></div>
                <div class="prog-dot" id="dot-moral"></div>
            </div>

            <!-- Cabeceiras de Basto -->
            <div class="hotspot" style="left:12%;top:22%;" onclick="enterRoom('mosteiro')"><div class="label">Mosteiro</div></div>
            <div class="hotspot" style="left:30%;top:15%;" onclick="enterRoom('basto')"><div class="label">O Basto</div></div>
            <div class="hotspot" style="left:52%;top:20%;" onclick="enterRoom('senhorinha')"><div class="label">Sta. Senhorinha</div></div>
            <div class="hotspot" style="left:72%;top:15%;" onclick="enterRoom('romaria')"><div class="label">A Romaria</div></div>
            <div class="hotspot" style="left:85%;top:35%;" onclick="enterRoom('jogopau')"><div class="label">Jogo do Pau</div></div>
            <div class="hotspot" style="left:78%;top:60%;" onclick="enterRoom('tamega')"><div class="label">Rio Tâmega</div></div>
            <div class="hotspot" style="left:60%;top:70%;" onclick="enterRoom('cabreira')"><div class="label">Cabreira</div></div>

            <!-- Disciplinas -->
            <div class="hotspot" style="left:10%;top:55%;" onclick="enterRoom('math')"><div class="label">Matemática</div></div>
            <div class="hotspot" style="left:25%;top:70%;" onclick="enterRoom('portugues')"><div class="label">Português</div></div>
            <div class="hotspot" style="left:42%;top:48%;" onclick="enterRoom('biologia')"><div class="label">Biologia</div></div>
            <div class="hotspot" style="left:58%;top:42%;" onclick="enterRoom('educacao')"><div class="label">Ed. Física</div></div>
            <div class="hotspot" style="left:20%;top:38%;" onclick="enterRoom('psicologia')"><div class="label">Psicologia</div></div>
            <div class="hotspot" style="left:40%;top:72%;" onclick="enterRoom('moral')"><div class="label">Moral</div></div>

            <p id="hint">Explora o mapa para encontrar os enigmas</p>
            <button id="exit" onclick="tryExit()">Saída</button>
            <div id="progress-bar"><div id="progress-fill"></div></div>
        </div>
    </div>
    <script src="../js/script.js"></script>
    <script>
        const ALL_SUBJECTS = ['mosteiro','basto','senhorinha','romaria','jogopau','tamega','cabreira','math','portugues','biologia','educacao','psicologia','moral'];
        function updateDots() {
            let solved = 0;
            ALL_SUBJECTS.forEach(s => {
                if (codes[s]) {
                    const dot = document.getElementById('dot-' + s);
                    if (dot) dot.classList.add('solved');
                    solved++;
                }
                document.querySelectorAll('.hotspot').forEach(h => {
                    if (h.getAttribute('onclick') && h.getAttribute('onclick').includes("'" + s + "'") && codes[s]) {
                        h.classList.add('solved');
                    }
                });
            });
            document.getElementById('progress-fill').style.width = (solved / ALL_SUBJECTS.length * 100) + '%';
            if (solved === ALL_SUBJECTS.length) {
                document.getElementById('exit').classList.add('ready');
                document.getElementById('hint').textContent = 'Todos os enigmas resolvidos — vai para a Saída!';
            }
        }
        window.onload = function() {
            if (document.getElementById('timer')) { startTimer(); updateDots(); }
        };
    </script>
</body>
</html>
