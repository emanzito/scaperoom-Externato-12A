<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Refojos - Escape Room</title>
    <link rel="icon" type="image/png" href="../images/logo.png">
    <link rel="stylesheet" href="../css/style.css">
</head>
<body>
    <div id="room">
        <div>
            <p class="room-tag">Enigma · Sala 11</p>
            <h2>Refojos</h2>
            <div class="room-divider"></div>
        </div>
        <div id="puzzle">
            <p id="question-text"></p>
            <input type="text" id="answer-input" placeholder="A tua resposta...">
        </div>
        <div class="btn-row">
            <button onclick="backToMap()">← Mapa</button>
            <button class="primary" onclick="submitAnswer('refojos')">Confirmar</button>
        </div>
        <div id="feedback"></div>
    </div>
    <script src="../js/script.js"></script>
    <script>
        document.getElementById('question-text').textContent = puzzles['refojos'].question;
        if (codes['refojos']) {
            document.getElementById('feedback').textContent = 'Já resolveste este enigma!';
            document.getElementById('feedback').className = 'already';
            document.getElementById('answer-input').disabled = true;
        }
        document.getElementById('answer-input').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') submitAnswer('refojos');
        });
    </script>
</body>
</html>
