<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vitória - Escape Room</title>
    <link rel="icon" type="image/png" href="../images/logo.png">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        body { min-height: 100vh; background: #0a0a0a; display: flex; align-items: center; justify-content: center; font-family: system-ui, -apple-system, sans-serif; overflow: hidden; position: relative; }
        .grid-overlay { position: fixed; inset: 0; background: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(255,255,255,0.012) 2px, rgba(255,255,255,0.012) 4px); pointer-events: none; }
        .corner { position: fixed; width: 24px; height: 24px; }
        .corner.tl { top:1.5rem;left:1.5rem;border-top:1px solid rgba(255,255,255,0.2);border-left:1px solid rgba(255,255,255,0.2); }
        .corner.tr { top:1.5rem;right:1.5rem;border-top:1px solid rgba(255,255,255,0.2);border-right:1px solid rgba(255,255,255,0.2); }
        .corner.bl { bottom:1.5rem;left:1.5rem;border-bottom:1px solid rgba(255,255,255,0.2);border-left:1px solid rgba(255,255,255,0.2); }
        .corner.br { bottom:1.5rem;right:1.5rem;border-bottom:1px solid rgba(255,255,255,0.2);border-right:1px solid rgba(255,255,255,0.2); }
        main { text-align: center; position: relative; z-index: 1; animation: fadeUp 0.9s ease both; padding: 2rem; }
        @keyframes fadeUp { from{opacity:0;transform:translateY(20px)} to{opacity:1;transform:translateY(0)} }
        .label { display: flex; align-items: center; justify-content: center; gap: 12px; margin-bottom: 2rem; }
        .label-line { height: 1px; width: 40px; background: rgba(255,255,255,0.18); }
        .label-text { font-size: 11px; letter-spacing: 4px; color: rgba(255,255,255,0.3); text-transform: uppercase; }
        h1 { font-size: clamp(2rem,5vw,3.5rem); font-weight: 300; color: #fff; letter-spacing: -1px; margin-bottom: 0.5rem; }
        .time-display { font-family: monospace; font-size: 2.8rem; font-weight: 600; color: #4ade80; letter-spacing: 4px; margin: 1.5rem 0 0.5rem; }
        .time-label { font-size: 12px; color: rgba(255,255,255,0.3); letter-spacing: 3px; text-transform: uppercase; margin-bottom: 2rem; }
        .congrats { font-size: 16px; color: rgba(255,255,255,0.5); letter-spacing: 1px; margin-bottom: 2.5rem; }
        .btn { display: inline-block; background: #fff; color: #0a0a0a; text-decoration: none; padding: 14px 44px; font-size: 13px; font-weight: 500; letter-spacing: 2.5px; text-transform: uppercase; border-radius: 2px; transition: all 0.2s; border: none; cursor: pointer; font-family: inherit; }
        .btn:hover { background: rgba(255,255,255,0.88); transform: translateY(-1px); }
        .creators { position: fixed; bottom: 2rem; left: 50%; transform: translateX(-50%); font-size: 11px; color: rgba(255,255,255,0.15); letter-spacing: 3px; text-transform: uppercase; white-space: nowrap; }
        .dot { display: inline-block; width: 6px; height: 6px; border-radius: 50%; background: #4ade80; margin-bottom: 2rem; animation: pulse 2s infinite; }
        @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.3} }
    </style>
</head>
<body>
    <div class="grid-overlay"></div>
    <div class="corner tl"></div>
    <div class="corner tr"></div>
    <div class="corner bl"></div>
    <div class="corner br"></div>

    <main>
        <div class="label">
            <div class="label-line"></div>
            <span class="label-text">Missão Concluída</span>
            <div class="label-line"></div>
        </div>

        <div class="dot"></div>
        <h1>Escapaste!</h1>
        <p class="congrats">Parabéns, conheces bem a terra de Basto!</p>

        <div class="time-display" id="time-display">00:00</div>
        <p class="time-label">Tempo restante</p>

        <button class="btn" onclick="restart()">Jogar Novamente</button>
    </main>

    <div class="creators">Criado por André · Emanuel · Fernando — © 2026. Todos os direitos reservados.</div>

    <script src="../js/script.js"></script>
    <script>
        window.onload = function() {
            let t = parseInt(localStorage.getItem('timeLeft')) || 0;
            let m = Math.floor(t / 60);
            let s = t % 60;
            document.getElementById('time-display').textContent =
                m.toString().padStart(2,'0') + ':' + s.toString().padStart(2,'0');
        };
    </script>
</body>
</html>
