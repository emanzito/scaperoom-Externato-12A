<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>O Basto - Escape Room</title>
    <link rel="icon" type="image/png" href="../images/logo.png">
    <link rel="stylesheet" href="../css/style.css">
</head>
<body>
    <div id="room">
        <div>
            <p class="room-tag">Cabeceiras de Basto · Sala 2</p>
            <h2>O Basto</h2>
            <div class="room-divider"></div>
        </div>
        <div id="puzzle">
            <p id="question-text"></p>
            <input type="text" id="answer-input" placeholder="A tua resposta...">
        </div>
        <div class="btn-row">
            <button onclick="backToMap()">← Mapa</button>
            <button class="primary" onclick="submitAnswer('basto')">Confirmar</button>
        </div>
        <div id="feedback"></div>
        <div id="word-reveal" style="margin-top:1.5rem;font-size:2rem;font-weight:600;letter-spacing:6px;color:#4ade80;opacity:0;transition:opacity 0.5s;"></div>
    </div>
    <script src="../js/script.js"></script>
    <script>
        document.getElementById('question-text').textContent = puzzles['basto'].question;
        if (codes['basto']) {
            document.getElementById('feedback').innerHTML = 'Já resolveste este enigma! Palavra: <strong>' + puzzleWords['basto'].word + '</strong>';
            document.getElementById('feedback').className = 'already';
            document.getElementById('answer-input').disabled = true;
            document.getElementById('word-reveal').textContent = puzzleWords['basto'].word;
            document.getElementById('word-reveal').style.opacity = '1';
        }
        document.getElementById('answer-input').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') submitAnswer('basto');
        });
    </script>
</body>
</html>
